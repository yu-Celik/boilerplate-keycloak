name: Password rotation (90 days)
schedule:
  after: 1d
  batch-size: 100
if: user-attribute-equals(passwordRotationEnabled, true)
steps:
  - uses: notify-user
    with:
      subject: "Changement de mot de passe requis"
      message: |
        <p>Bonjour ${user.firstName},</p>

        <p>Votre mot de passe doit être mis à jour pour des raisons de sécurité.
        Vous serez invité à le changer lors de votre prochaine connexion.</p>

        <p>Cordialement,<br/>
        L'équipe ${realm.displayName}</p>
  - uses: set-user-required-action
    after: 7d
    with:
      action: UPDATE_PASSWORD
