services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak}
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:${KC_IMAGE_TAG:-nightly}
    restart: unless-stopped
    command: >
      start
      --import-realm
      --hostname-backchannel-dynamic=true
      --proxy-headers=xforwarded
      --http-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-change_me}
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:3991}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    env_file:
      - .env
    ports:
      - "127.0.0.1:3991:8080"
    volumes:
      - ./configs/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./configs/init-realm.sh:/opt/keycloak/data/import/init-realm.sh:ro
      - ./configs/workflows/:/opt/keycloak/data/import/workflows/:ro
      - ./keycloakify/dist_keycloak/:/opt/keycloak/providers/:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nextjs:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3990}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KC_ISSUER: ${KC_ISSUER:-http://localhost:3991/realms/boilerplate}
      KC_ISSUER_INTERNAL: ${KC_ISSUER_INTERNAL:-http://keycloak:8080/realms/boilerplate}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-boilerplate-app}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      KC_SERVICE_ACCOUNT_CLIENT_ID: ${KC_SERVICE_ACCOUNT_CLIENT_ID:-boilerplate-service}
      KC_SERVICE_ACCOUNT_CLIENT_SECRET: ${KC_SERVICE_ACCOUNT_CLIENT_SECRET}
    ports:
      - "127.0.0.1:3990:3000"
    networks:
      - internal
    depends_on:
      keycloak:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
    ports:
      - "127.0.0.1:3992:8025"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
